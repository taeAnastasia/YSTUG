<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <rect width="900" height="260" fill="#ffffff"/>
  <rect x="35" y="70" width="210" height="90" rx="8" fill="#f2f2f2" stroke="#777"/>
  <rect x="345" y="70" width="210" height="90" rx="8" fill="#f2f2f2" stroke="#777"/>
  <rect x="655" y="70" width="210" height="90" rx="8" fill="#f2f2f2" stroke="#777"/>
  <line x1="245" y1="115" x2="345" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="555" y1="115" x2="655" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <text x="140" y="107" text-anchor="middle" font-family="Arial" font-size="18" fill="#222">источники</text>
  <text x="140" y="132" text-anchor="middle" font-family="Arial" font-size="14" fill="#444">челобитные, грамоты, кабалы</text>
  <text x="450" y="107" text-anchor="middle" font-family="Arial" font-size="18" fill="#222">таблица</text>
  <text x="450" y="132" text-anchor="middle" font-family="Arial" font-size="14" fill="#444">участники и связи</text>
  <text x="760" y="107" text-anchor="middle" font-family="Arial" font-size="18" fill="#222">вывод</text>
  <text x="760" y="132" text-anchor="middle" font-family="Arial" font-size="14" fill="#444">способы защиты интересов</text>
