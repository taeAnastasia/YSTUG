<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Схема связей</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:white;color:#222}
.wrap{padding:16px}
svg{width:100%;height:300px;border:1px solid #ddd;background:#fafafa}
line{stroke:#666;stroke-width:2}
circle{fill:#e6e6e6;stroke:#555;stroke-width:2}
text{font-size:14px}
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 700 300" aria-label="Схема связей участников дела">
  <line x1="160" y1="150" x2="350" y2="80"/>
  <line x1="160" y1="150" x2="350" y2="220"/>
  <line x1="350" y1="80" x2="540" y2="150"/>
  <line x1="350" y1="220" x2="540" y2="150"/>

  <circle cx="160" cy="150" r="55"/>
  <circle cx="350" cy="80" r="55"/>
  <circle cx="350" cy="220" r="55"/>
  <circle cx="540" cy="150" r="55"/>

  <text x="160" y="145" text-anchor="middle">община</text>
  <text x="160" y="165" text-anchor="middle">Устюга</text>
  <text x="350" y="75" text-anchor="middle">Савва</text>
  <text x="350" y="95" text-anchor="middle">Пинегин</text>
  <text x="350" y="215" text-anchor="middle">должники</text>
  <text x="350" y="235" text-anchor="middle">и ответчики</text>
  <text x="540" y="145" text-anchor="middle">Устюжская</text>
  <text x="540" y="165" text-anchor="middle">четверть</text>
</svg>
</div>
</body>
</html>
